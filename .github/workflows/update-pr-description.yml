name: Update PR Description

# Triggered manually by maintainers commenting `/update-pr` on a PR.
# Updates the PR title and description from mnemonic design decision notes.

on:
  issue_comment:
    types: [created]

permissions:
  pull-requests: write
  contents: read

jobs:
  update-pr-description:
    runs-on: ubuntu-latest

    # Run only when a PR comment starts with `/update-pr` AND the commenter is a maintainer
    if: |
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request != null &&
      startsWith(github.event.comment.body, '/update-pr') &&
      contains(fromJson('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)

    steps:
      - name: Resolve PR number and head commit
        id: ctx
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER="${{ github.event.issue.number }}"
          HEAD_SHA=$(gh pr view "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --json headRefOid \
            --jq '.headRefOid')
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"

      # Always check out the base branch so we only run trusted script code.
      # Note file contents are fetched via GitHub API using the resolved head SHA.
      - name: Check out base branch
        uses: actions/checkout@v6

      - name: Generate and update PR description
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          node scripts/ci/update-pr-description.mjs \
            --pr "${{ steps.ctx.outputs.pr_number }}" \
            --repo "${{ github.repository }}" \
            --head-sha "${{ steps.ctx.outputs.head_sha }}"

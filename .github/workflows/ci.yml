name: CI

on:
  push:
    branches:
      - main
  pull_request:
    paths-ignore:
      - "Formula/**"

jobs:
  check-toolchain-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Verify Node version in sync across CI and devcontainer
        run: |
          node -e "
            const fs = require('fs');
            const ci = fs.readFileSync('.github/workflows/ci.yml', 'utf8');
            const devcontainer = require('./.devcontainer/devcontainer.json');
            const ciVersions = [...ci.matchAll(/node-version:\s*(\d+)/g)].map(m => m[1]);
            const ciVersion = [...new Set(ciVersions)].sort().join(',');
            const devcontainerVersion = devcontainer.features['ghcr.io/devcontainers/features/node:2'].version;
            if (ciVersion !== devcontainerVersion) {
              console.error('Node version mismatch: CI=' + ciVersion + ' devcontainer=' + devcontainerVersion);
              process.exit(1);
            }
            console.log('Node version in sync: ' + ciVersion);
          "

  build-and-test:
    needs: check-toolchain-sync
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: AST lint
        run: npm run lint:ast

      - name: Clean and build
        run: npm run build:clean

      - name: Run tests
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts/ci-learning
          npm test 2>&1 | tee artifacts/ci-learning/test-output.log

      - name: Summarize failed test run
        if: failure()
        run: |
          node scripts/ci/collect-test-failure.mjs \
            --input artifacts/ci-learning/test-output.log \
            --outdir artifacts/ci-learning \
            --command "npm test"

      - name: Upload CI learning artifact
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ci-learning
          path: artifacts/ci-learning

name: Publish Staging Package

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish-staging:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for npm OIDC trusted publishing

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Update npm for OIDC trusted publishing
        run: npm install -g npm@latest  # Requires npm >= 11.5.1

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Set staging package version
        run: |
          node --input-type=module <<'EOF'
          import fs from "node:fs";

          const packageJson = JSON.parse(fs.readFileSync("package.json", "utf8"));
          const baseVersion = packageJson.version.replace(/-.*/, "");
          packageJson.version = `${baseVersion}-next.${process.env.GITHUB_RUN_NUMBER}`;

          fs.writeFileSync("package.json", `${JSON.stringify(packageJson, null, 2)}\n`);
          EOF

      - name: Publish to npm (next)
        run: npm publish --tag next  # Provenance attestation is automatic via OIDC trusted publishing

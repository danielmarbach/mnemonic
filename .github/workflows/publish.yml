name: Publish Package

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to simulate (e.g. v0.4.1)"
        required: true
      dry_run:
        description: "Skip publishing (npm, Docker, GitHub release, milestone)"
        type: boolean
        default: true
      run_npm:
        description: "Run npm publish job"
        type: boolean
        default: true
      run_docker:
        description: "Run Docker publish job"
        type: boolean
        default: true
      run_homebrew:
        description: "Run Homebrew formula update job"
        type: boolean
        default: true
      run_release:
        description: "Run GitHub release and milestone job"
        type: boolean
        default: true

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    if: ${{ github.event_name == 'push' || inputs.run_npm || inputs.run_docker }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref_name }}
          sparse-checkout: package.json
          sparse-checkout-cone-mode: false

      - name: Verify tag matches package version
        if: ${{ !inputs.dry_run }}
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG_NAME="${{ inputs.tag || github.ref_name }}"

          if [ "$TAG_NAME" != "v$PACKAGE_VERSION" ]; then
            echo "Tag $TAG_NAME does not match package version v$PACKAGE_VERSION"
            exit 1
          fi

  publish-npm:
    needs: verify
    if: ${{ github.event_name == 'push' || inputs.run_npm }}
    runs-on: ubuntu-latest
    environment: Release
    permissions:
      contents: read
      id-token: write  # Required for npm OIDC trusted publishing

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Update npm for OIDC trusted publishing
        run: npm install -g npm@latest  # Requires npm >= 11.5.1

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Publish to npm
        if: ${{ !inputs.dry_run }}
        run: npm publish  # Provenance attestation is automatic via OIDC trusted publishing

  publish-docker:
    needs: verify
    if: ${{ github.event_name == 'push' || inputs.run_docker }}
    runs-on: ubuntu-latest
    environment: Release
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        if: ${{ !inputs.dry_run }}
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Extract version for Docker tag
        id: version
        run: echo "tag=${{ inputs.tag || github.ref_name }}" | sed 's/tag=v/tag=/' >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ !inputs.dry_run }}
          tags: |
            danielmarbach/mnemonic-mcp:latest
            danielmarbach/mnemonic-mcp:${{ steps.version.outputs.tag }}

  publish-homebrew-tap:
    needs: [verify, publish-npm]
    if: ${{ always() && (github.event_name == 'push' || inputs.run_homebrew) && (needs.verify.result == 'success' || needs.verify.result == 'skipped') && (needs.publish-npm.result == 'success' || needs.publish-npm.result == 'skipped') }}
    runs-on: ubuntu-latest
    environment: Release
    permissions:
      contents: write       # Required to push update branch
      pull-requests: write  # Required to open the formula update PR

    steps:
      - name: Check out main branch
        uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.BOT_GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Calculate npm tarball SHA256
        id: tarball
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          URL="https://registry.npmjs.org/@danielmarbach/mnemonic-mcp/-/mnemonic-mcp-${VERSION}.tgz"
          
          for i in {1..5}; do
            if SHA256=$(curl -fsSL "$URL" | sha256sum | cut -d' ' -f1); then
              break
            fi
            echo "Retry $i/5: npm tarball not yet available, waiting..."
            sleep 2
          done
          
          if [ -z "$SHA256" ]; then
            echo "Failed to fetch npm tarball after 5 attempts"
            exit 1
          fi
          
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Update formula
        if: ${{ !inputs.dry_run }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s|^  url \"[^\"]*\"|  url \"${{ steps.tarball.outputs.url }}\"|" Formula/mnemonic-mcp.rb
          sed -i "s|^  sha256 \"[^\"]*\"|  sha256 \"${{ steps.tarball.outputs.sha256 }}\"|" Formula/mnemonic-mcp.rb

      - name: Create or update pull request for formula update
        if: ${{ !inputs.dry_run }}
        id: homebrew_pr
        env:
          GH_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BRANCH="automation/homebrew-tap-${VERSION}"
          TITLE="Update mnemonic-mcp formula to ${VERSION}"

          if git diff --quiet -- Formula/mnemonic-mcp.rb; then
            echo "Formula unchanged; skipping PR creation"

            if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
              echo "Removing stale remote branch $BRANCH"
              git push origin --delete "$BRANCH"
            fi

            exit 0
          fi

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          git switch -C "$BRANCH"
          git add Formula/mnemonic-mcp.rb
          git commit -m "$TITLE"
          git push -u origin "$BRANCH" --force-with-lease

          PR_NUMBER=$(gh pr list --repo "${{ github.repository }}" --head "$BRANCH" --state open --json number --jq 'if length > 0 then .[0].number else "" end')

          if [ -z "$PR_NUMBER" ]; then
            BODY_FILE=$(mktemp)
            {
              echo "Automated Homebrew formula update generated by the publish workflow."
              echo
              echo "- Formula: \`Formula/mnemonic-mcp.rb\`"
              echo "- Version: \`${VERSION}\`"
              echo "- Tarball URL: \`${{ steps.tarball.outputs.url }}\`"
            } > "$BODY_FILE"

            PR_URL=$(gh pr create \
              --repo "${{ github.repository }}" \
              --base main \
              --head "$BRANCH" \
              --title "$TITLE" \
              --body-file "$BODY_FILE" \
            )

            rm -f "$BODY_FILE"
            PR_NUMBER="${PR_URL##*/}"
          fi

          if [[ ! "$PR_NUMBER" =~ ^[1-9][0-9]*$ ]]; then
            echo "Unable to resolve PR number for branch $BRANCH; skipping auto-merge and approval"
            echo "pr_number=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Enable auto-merge for formula PR
        if: ${{ !inputs.dry_run && steps.homebrew_pr.outputs.pr_number != '' }}
        env:
          GH_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
        run: |
          gh pr merge "${{ steps.homebrew_pr.outputs.pr_number }}" \
            --repo "${{ github.repository }}" \
            --auto \
            --squash \
            --delete-branch

  create-release:
    needs: [verify, publish-npm, publish-docker, publish-homebrew-tap]
    if: ${{ always() && (github.event_name == 'push' || inputs.run_release) && (needs.verify.result == 'success' || needs.verify.result == 'skipped') && (needs.publish-npm.result == 'success' || needs.publish-npm.result == 'skipped') && (needs.publish-docker.result == 'success' || needs.publish-docker.result == 'skipped') && (needs.publish-homebrew-tap.result == 'success' || needs.publish-homebrew-tap.result == 'skipped') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to create GitHub releases
      issues: write    # Required to close milestones

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          sparse-checkout: CHANGELOG.md
          sparse-checkout-cone-mode: false

      - name: Extract release notes from changelog
        run: |
          VERSION="${{ inputs.tag || github.ref_name }}"
          VERSION="${VERSION#v}"
          awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md \
            | sed '/./,$!d' \
            > RELEASE_NOTES_LATEST.md
          echo "Extracted release notes for v${VERSION}:"
          cat RELEASE_NOTES_LATEST.md

      - name: Create GitHub release
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ inputs.tag || github.ref_name }}" \
            --title "${{ inputs.tag || github.ref_name }}" \
            --notes-file RELEASE_NOTES_LATEST.md

      - name: Close milestone
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          MILESTONE=$(gh api "repos/${{ github.repository }}/milestones" \
            --jq ".[] | select(.title == \"${TAG}\") | .number" 2>/dev/null || true)
          if [ -n "$MILESTONE" ]; then
            gh api "repos/${{ github.repository }}/milestones/${MILESTONE}" \
              -X PATCH -f state=closed
            echo "Closed milestone ${TAG} (#${MILESTONE})"
          else
            echo "No milestone named ${TAG} found, skipping"
          fi
